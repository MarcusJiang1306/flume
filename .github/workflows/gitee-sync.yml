permissions:
  contents: write

name: Sync from Gitee

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add Gitee remote and fetch
        run: |
          git remote add gitee https://gitee.com/marcusjiang/flume.git
          git fetch gitee

      - name: Check for gitee updates
        id: check-update
        run: |
          GITEE_COMMIT=$(git rev-parse gitee/main)
          LOCAL_COMMIT=$(git rev-parse origin/main)
          if [ "$GITEE_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "no_update=true" >> $GITHUB_OUTPUT
          else
            echo "no_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge gitee/main
        if: steps.check-update.outputs.no_update == 'false'
        run: |
          git merge gitee/main --allow-unrelated-histories || echo "merge conflict"

      - name: Resolve conflicts using remote (theirs)
        if: steps.check-update.outputs.no_update == 'false'
        run: |
          git diff --name-only --diff-filter=U | xargs -I {} git checkout --theirs {}
          git add .
          git commit -m "Resolve merge conflicts using remote version" || echo "no conflict"

      - name: Push to origin
        if: steps.check-update.outputs.no_update == 'false'
        run: |
          git push origin main
